<!DOCTYPE html>
<html>
<head>
    <title>Тест Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Тест подключения к Supabase</h1>
    <div id="result" style="margin: 20px; padding: 20px; border: 1px solid #ccc;"></div>
    
    <script>
        const SUPABASE_URL = 'https://jwjskwicrtoknrsucnxn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3anNrd2ljcnRva25yc3VjbnhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDM3NDcsImV4cCI6MjA4ODg3OTc0N30.N9U4OwtbCzzYo3TwBV1IIVMS4lRNCvhUCRFgcga_WUc';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '🔄 Проверяем подключение...';
            
            try {
                // 1. Проверяем таблицы
                resultDiv.innerHTML += '<br><br>📊 Проверяем таблицы...';
                
                const { error: usersError } = await supabaseClient
                    .from('users')
                    .select('*')
                    .limit(1);
                
                if (usersError) {
                    resultDiv.innerHTML += '<br>❌ Ошибка users: ' + usersError.message;
                } else {
                    resultDiv.innerHTML += '<br>✅ Таблица users доступна';
                }
                
                const { error: requestsError } = await supabaseClient
                    .from('requests')
                    .select('*')
                    .limit(1);
                
                if (requestsError) {
                    resultDiv.innerHTML += '<br>❌ Ошибка requests: ' + requestsError.message;
                } else {
                    resultDiv.innerHTML += '<br>✅ Таблица requests доступна';
                }
                
                // 2. Пробуем создать пользователя
                resultDiv.innerHTML += '<br><br>📝 Создаем тестового пользователя...';
                const testUserId = 'test_' + Date.now();
                
                const { data: userData, error: userInsertError } = await supabaseClient
                    .from('users')
                    .insert([
                        {
                            id: testUserId,
                            name: 'Тестовый пользователь',
                            points: 0,
                            role: 'user'
                        }
                    ])
                    .select();
                
                if (userInsertError) {
                    resultDiv.innerHTML += '<br>❌ Ошибка создания пользователя: ' + userInsertError.message;
                } else {
                    resultDiv.innerHTML += '<br>✅ Пользователь создан с ID: ' + testUserId;
                    
                    // 3. Пробуем создать заявку с этим пользователем
                    resultDiv.innerHTML += '<br><br>📝 Создаем тестовую заявку...';
                    
                    const { data: requestData, error: requestInsertError } = await supabaseClient
                        .from('requests')
                        .insert([
                            {
                                type: 'idea',
                                description: 'Тестовая заявка',
                                location: 'Тест',
                                author: 'Тестовый пользователь',
                                author_id: testUserId,
                                status: 'new',
                                date: new Date().toISOString()
                            }
                        ])
                        .select();
                    
                    if (requestInsertError) {
                        resultDiv.innerHTML += '<br>❌ Ошибка создания заявки: ' + requestInsertError.message;
                        
                        // Показываем детали ошибки
                        if (requestInsertError.message.includes('foreign key')) {
                            resultDiv.innerHTML += '<br><br>🔧 Проблема с внешним ключом. Нужно отключить RLS или настроить политики.';
                        }
                    } else {
                        resultDiv.innerHTML += '<br>✅ Заявка успешно создана!';
                    }
                }
                
            } catch (error) {
                resultDiv.innerHTML += '<br>❌ Критическая ошибка: ' + error.message;
                console.error('Детали ошибки:', error);
            }
        }
        
        testConnection();
    </script>
</body>
</html>
