<!DOCTYPE html>
<html>
<head>
    <title>Тест Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Тест подключения к Supabase</h1>
    <div id="result" style="margin: 20px; padding: 20px; border: 1px solid #ccc;"></div>
    
    <script>
        // Используем другое имя, чтобы избежать конфликта
        const SUPABASE_URL = 'https://jwjskwicrtoknrsucnxn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3anNrd2ljcnRva25yc3VjbnhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDM3NDcsImV4cCI6MjA4ODg3OTc0N30.N9U4OwtbCzzYo3TwBV1IIVMS4lRNCvhUCRFgcga_WUc';
        
        // Создаем клиент с уникальным именем
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '🔄 Проверяем подключение...';
            
            try {
                // 1. Проверяем таблицу users
                resultDiv.innerHTML += '<br>Проверяем таблицу users...';
                const { data: usersData, error: usersError } = await supabaseClient
                    .from('users')
                    .select('count', { count: 'exact', head: true });
                
                if (usersError) {
                    resultDiv.innerHTML += '<br>❌ Ошибка таблицы users: ' + usersError.message;
                } else {
                    resultDiv.innerHTML += '<br>✅ Таблица users существует';
                }
                
                // 2. Проверяем таблицу requests
                resultDiv.innerHTML += '<br>Проверяем таблицу requests...';
                const { data: requestsData, error: requestsError } = await supabaseClient
                    .from('requests')
                    .select('count', { count: 'exact', head: true });
                
                if (requestsError) {
                    resultDiv.innerHTML += '<br>❌ Ошибка таблицы requests: ' + requestsError.message;
                } else {
                    resultDiv.innerHTML += '<br>✅ Таблица requests существует';
                }
                
                // 3. Пробуем создать тестовую запись
                resultDiv.innerHTML += '<br><br>Пробуем создать тестовую запись...';
                const { data: insertData, error: insertError } = await supabaseClient
                    .from('requests')
                    .insert([
                        {
                            type: 'idea',
                            description: 'Тест подключения',
                            location: 'Тест',
                            author: 'Тестовый пользователь',
                            status: 'new',
                            date: new Date().toISOString()
                        }
                    ]);
                
                if (insertError) {
                    resultDiv.innerHTML += '<br>❌ Ошибка создания записи: ' + insertError.message;
                } else {
                    resultDiv.innerHTML += '<br>✅ Тестовая запись создана!';
                }
                
            } catch (error) {
                resultDiv.innerHTML += '<br>❌ Критическая ошибка: ' + error.message;
                console.error('Детали ошибки:', error);
            }
        }
        
        // Запускаем тест
        testConnection();
    </script>
</body>
</html>
