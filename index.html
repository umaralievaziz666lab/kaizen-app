<body>
    <h1>Тест Supabase</h1>
    <div id="status" style="color: blue;">Загрузка...</div>
    <div id="result" style="margin-top: 20px;"></div>

    <script>
        // Просто объявляем переменные
        const SUPABASE_URL = 'https://jwjskwicrtoknrsucnxn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3anNrd2ljcnRva25yc3VjbnhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDM3NDcsImV4cCI6MjA4ODg3OTc0N30.N9U4OwtbCzzYo3TwBV1IIVMS4lRNCvhUCRFgcga_WUc';
        
        // Создаем клиент
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Пишем в консоль
        console.log('Клиент создан:', supabase);
        
        // Меняем текст на странице
        document.getElementById('status').innerHTML = '✅ Клиент создан, пробуем подключиться...';
        
        // Пробуем самый простой запрос
        supabase
            .from('users')
            .select('count', { count: 'exact', head: true })
            .then(response => {
                console.log('Ответ:', response);
                if (response.error) {
                    document.getElementById('result').innerHTML = '❌ Ошибка: ' + response.error.message;
                } else {
                    document.getElementById('result').innerHTML = '✅ Подключение работает!';
                }
            })
            .catch(error => {
                console.error('Ошибка:', error);
                document.getElementById('result').innerHTML = '❌ Ошибка: ' + error.message;
            });
    </script>
</body>
</html>
